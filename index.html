<!DOCTYPE html>
<html lang="am">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>ጄሪ ኢቨንት ኦርጋናይዘርስ — ሆሳዕና</title>
  <style>
/* =============================================
   JERRY EVENT ORGANIZERS — Stylesheet
   Palette: Deep Burgundy + Ethiopian Gold + Ivory
   ============================================= */
:root {
  --burgundy:      #6B1E3A;
  --burgundy-dark: #4A1228;
  --gold:          #C9932A;
  --gold-light:    #F0C060;
  --ivory:         #FAF6F0;
  --dark:          #1C1008;
  --gray:          #6B6258;
  --border:        #E8DDD4;
  --white:         #FFFFFF;
  --shadow:        0 4px 20px rgba(107,30,58,.12);
  --radius:        12px;
  --tr:            0.25s ease;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Segoe UI','Noto Sans Ethiopic',sans-serif;background:var(--ivory);color:var(--dark);line-height:1.6;}
a{text-decoration:none;color:inherit;}
img{max-width:100%;display:block;}

/* NAVBAR */
.navbar{display:flex;align-items:center;justify-content:space-between;padding:0 5%;height:68px;background:var(--burgundy-dark);position:sticky;top:0;z-index:100;box-shadow:0 2px 12px rgba(0,0,0,.3);}
.logo-main{font-size:1.2rem;font-weight:900;color:var(--gold-light);letter-spacing:.02em;}
.logo-sub{font-size:.65rem;color:#d4a8b8;letter-spacing:.08em;text-transform:uppercase;}
.nav-links{display:flex;gap:1.8rem;list-style:none;}
.nav-links a{color:#e8ccd6;font-weight:600;font-size:.9rem;transition:color var(--tr);padding:.3rem 0;border-bottom:2px solid transparent;}
.nav-links a:hover{color:var(--gold-light);border-bottom-color:var(--gold);}
.nav-right{display:flex;align-items:center;gap:.8rem;}
.lang-btn{background:rgba(255,255,255,.1);color:var(--gold-light);border:1px solid rgba(201,147,42,.4);padding:.35rem .9rem;border-radius:20px;cursor:pointer;font-weight:700;font-size:.8rem;transition:all var(--tr);}
.lang-btn:hover{background:rgba(201,147,42,.2);}
.nav-cta{background:var(--gold);color:var(--dark);padding:.45rem 1.2rem;border-radius:25px;font-weight:800;font-size:.85rem;transition:background var(--tr);}
.nav-cta:hover{background:var(--gold-light);}

/* HERO */
.hero{position:relative;min-height:88vh;display:flex;align-items:center;background:linear-gradient(135deg,var(--burgundy-dark) 0%,var(--burgundy) 60%,#8B2E52 100%);overflow:hidden;padding:4rem 5%;}
.hero::before{content:'';position:absolute;inset:0;background:url('https://images.unsplash.com/photo-1519225421980-715cb0215aed?w=1400') center/cover no-repeat;opacity:.1;}
.hero-content{position:relative;z-index:2;max-width:580px;}
.hero-eyebrow{display:inline-flex;align-items:center;gap:.5rem;background:rgba(201,147,42,.18);border:1px solid rgba(201,147,42,.4);color:var(--gold-light);padding:.4rem 1rem;border-radius:25px;font-size:.78rem;font-weight:700;letter-spacing:.07em;text-transform:uppercase;margin-bottom:1.5rem;}
.hero h1{font-size:clamp(2rem,5vw,3.5rem);font-weight:900;color:#fff;line-height:1.15;margin-bottom:1.2rem;}
.hero h1 .accent{color:var(--gold-light);}
.hero p{color:#e0c8d0;font-size:1.05rem;margin-bottom:2rem;max-width:460px;}
.hero-btns{display:flex;gap:1rem;flex-wrap:wrap;}
.btn-gold{background:var(--gold);color:var(--dark);padding:.8rem 1.8rem;border-radius:30px;font-weight:800;font-size:.95rem;border:none;cursor:pointer;transition:all var(--tr);}
.btn-gold:hover{background:var(--gold-light);transform:translateY(-2px);box-shadow:0 6px 20px rgba(201,147,42,.4);}
.btn-ghost{background:transparent;color:#fff;padding:.8rem 1.8rem;border-radius:30px;font-weight:700;font-size:.95rem;border:2px solid rgba(255,255,255,.4);cursor:pointer;transition:all var(--tr);}
.btn-ghost:hover{border-color:#fff;background:rgba(255,255,255,.08);}
.hero-stats{display:flex;gap:2.5rem;margin-top:3rem;padding-top:2rem;border-top:1px solid rgba(255,255,255,.15);}
.stat-num{font-size:1.7rem;font-weight:900;color:var(--gold-light);}
.stat-label{font-size:.75rem;color:#c8aab4;margin-top:.1rem;}

/* SECTIONS */
.section{padding:5rem 5%;}
.section-bg{background:var(--white);}
.sec-label{display:inline-block;color:var(--gold);font-weight:700;font-size:.75rem;letter-spacing:.12em;text-transform:uppercase;margin-bottom:.5rem;}
.sec-title{font-size:clamp(1.5rem,3vw,2.1rem);font-weight:900;margin-bottom:.5rem;}
.sec-sub{color:var(--gray);font-size:.95rem;max-width:520px;}
.title-line{width:44px;height:4px;background:var(--gold);border-radius:2px;margin:.7rem 0 2rem;}

/* SERVICES */
.services-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:1.2rem;margin-top:1.5rem;}
.service-card{background:var(--white);border-radius:var(--radius);padding:1.6rem 1.3rem;box-shadow:0 2px 10px rgba(0,0,0,.07);border-top:4px solid transparent;transition:all var(--tr);}
.service-card:hover{transform:translateY(-5px);box-shadow:var(--shadow);border-top-color:var(--gold);}
.svc-icon{font-size:2rem;margin-bottom:.8rem;}
.service-card h3{font-size:1rem;font-weight:800;margin-bottom:.4rem;}
.service-card p{color:var(--gray);font-size:.85rem;line-height:1.6;}
.svc-price{margin-top:.8rem;font-weight:800;color:var(--burgundy);font-size:.9rem;}

/* BOOKING */
.booking-section{background:var(--burgundy-dark);color:white;}
.booking-section .sec-title{color:white;}
.booking-section .sec-sub{color:#d4a8b8;}
.booking-grid{display:grid;grid-template-columns:1.4fr 1fr;gap:3rem;align-items:start;margin-top:2rem;}
.form-card{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);border-radius:var(--radius);padding:2rem;}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:1rem;}
.form-group{margin-bottom:1.1rem;}
.form-group label{display:block;font-size:.82rem;font-weight:600;color:#d4a8b8;margin-bottom:.35rem;}
.form-group input,.form-group select,.form-group textarea{width:100%;padding:.72rem 1rem;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.18);border-radius:8px;color:white;font-size:.92rem;transition:border-color var(--tr);font-family:inherit;}
.form-group input::placeholder,.form-group textarea::placeholder{color:#9a7a86;}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{outline:none;border-color:var(--gold);}
.form-group select option{background:var(--burgundy-dark);color:white;}
.booking-info h3{font-size:1.15rem;font-weight:800;color:var(--gold-light);margin-bottom:1.3rem;}
.info-item{display:flex;gap:.9rem;margin-bottom:1.3rem;align-items:flex-start;}
.info-icon{font-size:1.5rem;flex-shrink:0;}
.info-item h4{font-size:.9rem;font-weight:700;color:#f0d8e0;margin-bottom:.2rem;}
.info-item p{font-size:.82rem;color:#b8909c;line-height:1.5;}

/* PACKAGES */
.packages-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(270px,1fr));gap:1.5rem;margin-top:1.5rem;}
.package-card{background:var(--white);border-radius:var(--radius);box-shadow:0 2px 10px rgba(0,0,0,.07);overflow:hidden;border:2px solid transparent;transition:all var(--tr);}
.package-card.featured{border-color:var(--gold);}
.package-card:hover{transform:translateY(-5px);box-shadow:var(--shadow);}
.pkg-header{padding:1.4rem;background:var(--ivory);border-bottom:1px solid var(--border);}
.pkg-badge{display:inline-block;background:var(--gold);color:var(--dark);font-size:.68rem;font-weight:700;padding:.2rem .7rem;border-radius:20px;margin-bottom:.6rem;}
.pkg-name{font-size:1.1rem;font-weight:900;}
.pkg-price{font-size:1.5rem;font-weight:900;color:var(--burgundy);margin-top:.4rem;}
.pkg-price-from{font-size:.8rem;font-weight:400;color:var(--gray);}
.pkg-body{padding:1.3rem;}
.pkg-body ul{list-style:none;}
.pkg-body li{padding:.38rem 0;font-size:.88rem;color:var(--gray);border-bottom:1px solid var(--border);display:flex;gap:.5rem;align-items:center;}
.pkg-body li::before{content:'✓';color:var(--gold);font-weight:900;flex-shrink:0;}
.pkg-footer{padding:.8rem 1.3rem 1.3rem;}
.btn{padding:.65rem 1.4rem;border-radius:8px;border:none;cursor:pointer;font-weight:700;font-size:.88rem;transition:all var(--tr);}
.btn-primary{background:var(--burgundy);color:white;}
.btn-primary:hover{background:var(--burgundy-dark);transform:translateY(-1px);}
.btn-full{width:100%;padding:.85rem;font-size:.95rem;}

/* GALLERY */
.gallery-grid{display:grid;grid-template-columns:repeat(4,1fr);grid-template-rows:190px 190px;gap:.9rem;margin-top:1.5rem;}
.gallery-item{border-radius:var(--radius);overflow:hidden;position:relative;cursor:pointer;}
.gallery-item img{width:100%;height:100%;object-fit:cover;transition:transform .4s ease;}
.gallery-item:hover img{transform:scale(1.07);}
.gallery-item:first-child{grid-column:span 2;grid-row:span 2;}
.gallery-overlay{position:absolute;inset:0;background:linear-gradient(to top,rgba(107,30,58,.85) 0%,transparent 55%);opacity:0;transition:opacity var(--tr);display:flex;align-items:flex-end;padding:1rem;}
.gallery-item:hover .gallery-overlay{opacity:1;}
.gallery-overlay span{color:white;font-weight:700;font-size:.88rem;}

/* LOCATIONS */
.locations-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:1rem;margin-top:1.5rem;}
.location-chip{background:var(--white);border:2px solid var(--border);border-radius:10px;padding:.9rem;text-align:center;transition:all var(--tr);cursor:default;}
.location-chip:hover{border-color:var(--gold);background:#FFF8EE;transform:translateY(-3px);box-shadow:0 4px 12px rgba(201,147,42,.2);}
.loc-icon{font-size:1.4rem;margin-bottom:.3rem;}
.loc-name{font-weight:700;font-size:.88rem;}
.loc-region{font-size:.72rem;color:var(--gray);margin-top:.15rem;}

/* CONTACT */
.contact-grid{display:grid;grid-template-columns:1fr 1fr;gap:3rem;align-items:start;margin-top:2rem;}
.contact-form-card{background:var(--white);border-radius:var(--radius);padding:2rem;box-shadow:0 2px 10px rgba(0,0,0,.07);}
.contact-form-card .form-group label{color:var(--gray);}
.contact-form-card input,.contact-form-card textarea,.contact-form-card select{background:var(--ivory);border:2px solid var(--border);border-radius:8px;color:var(--dark);padding:.72rem 1rem;width:100%;font-size:.92rem;font-family:inherit;transition:border-color var(--tr);}
.contact-form-card input:focus,.contact-form-card textarea:focus{outline:none;border-color:var(--burgundy);}
.contact-info-box{background:var(--burgundy);color:white;border-radius:var(--radius);padding:2rem;}
.contact-info-box h3{font-size:1.1rem;font-weight:800;color:var(--gold-light);margin-bottom:1.3rem;}
.c-row{display:flex;gap:.9rem;align-items:center;margin-bottom:1.1rem;}
.c-row .c-icon{font-size:1.3rem;}
.c-row p{font-size:.88rem;color:#e0c8d0;}
.map-box{margin-top:1.5rem;border-radius:10px;overflow:hidden;}

/* TOAST */
.toast{position:fixed;bottom:2rem;left:50%;transform:translateX(-50%) translateY(120px);background:var(--burgundy-dark);color:white;padding:.85rem 1.8rem;border-radius:30px;font-weight:600;z-index:999;border:1px solid var(--gold);transition:transform .3s ease,opacity .3s ease;opacity:0;font-family:inherit;}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1;}

/* FOOTER */
footer{background:var(--dark);color:#a09090;padding:2rem 5%;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:1rem;}
.footer-brand{font-size:1.1rem;font-weight:900;color:var(--gold-light);}
footer p{font-size:.82rem;}

/* RESPONSIVE */
@media(max-width:900px){
  .booking-grid,.contact-grid{grid-template-columns:1fr;}
  .gallery-grid{grid-template-columns:1fr 1fr;grid-template-rows:auto;}
  .gallery-item:first-child{grid-column:span 2;}
}
@media(max-width:650px){
  .nav-links{display:none;}
  .form-row{grid-template-columns:1fr;}
  .hero-stats{gap:1.5rem;}
}
  </style>
</head>

<nav class="navbar">

    '<div class="info-item"><div class="info-icon">💰</div><div><h4>'+t('info3_t')+'</h4><p>'+t('info3_p')+'</p></div></div>' +
    '<div class="info-item"><div class="info-icon">📍</div><div><h4>'+t('info4_t')+'</h4><p>'+t('info4_p')+'</p></div></div>';

  document.getElementById('sec-pkg-label').textContent = t('pkg_label');
  document.getElementById('sec-pkg-title').textContent = t('pkg_title');
  document.getElementById('sec-pkg-sub').textContent   = t('pkg_sub');
  var pkgs = [{key:'pkg1',featured:false},{key:'pkg2',featured:true},{key:'pkg3',featured:false}];
  document.getElementById('packages-grid').innerHTML = pkgs.map(function(p){
    var featureBadge = p.featured ? '<div class="pkg-badge">⭐ '+(currentLang==='am'?'ተወዳጅ':'Popular')+'</div>' : '';
    var features = (translations[currentLang][p.key+'_features']||[]).map(function(f){ return '<li>'+f+'</li>'; }).join('');
    return '<div class="package-card '+(p.featured?'featured':'')+'">' +
      '<div class="pkg-header">'+featureBadge+'<div class="pkg-name">'+t(p.key+'_name')+'</div>' +
      '<div class="pkg-price"><span class="pkg-price-from">'+t(p.key+'_from')+' </span>'+t(p.key+'_price')+'</div></div>' +
      '<div class="pkg-body"><ul>'+features+'</ul></div>' +
      '<div class="pkg-footer"><a href="#booking"><button class="btn btn-primary btn-full">'+t('pkg_btn')+'</button></a></div></div>';
  }).join('');

  document.getElementById('sec-gal-label').textContent = t('gallery_label');
  document.getElementById('sec-gal-title').textContent = t('gallery_title');
  document.getElementById('sec-gal-sub').textContent   = t('gallery_sub');
  document.getElementById('gallery-grid').innerHTML = gallery.map(function(g){
    var lbl = currentLang==='am'?g.label_am:g.label_en;
    return '<div class="gallery-item"><img src="'+g.img+'" alt="'+lbl+'" loading="lazy"/><div class="gallery-overlay"><span>'+lbl+'</span></div></div>';
  }).join('');

  document.getElementById('sec-loc-label').textContent = t('loc_label');
  document.getElementById('sec-loc-title').textContent = t('loc_title');
  document.getElementById('sec-loc-sub').textContent   = t('loc_sub');
  document.getElementById('locations-grid').innerHTML = locations.map(function(l){
    return '<div class="location-chip"><div class="loc-icon">'+l.icon+'</div><div class="loc-name">'+(currentLang==='am'?l.name_am:l.name_en)+'</div><div class="loc-region">'+(currentLang==='am'?l.region_am:l.region_en)+'</div></div>';
  }).join('');

  document.getElementById('sec-con-label').textContent   = t('contact_label');
  document.getElementById('sec-con-title').textContent   = t('contact_title');
  document.getElementById('sec-con-sub').textContent     = t('contact_sub');
  document.getElementById('c-lbl-name').textContent      = t('c_name');
  document.getElementById('c-lbl-phone').textContent     = t('c_phone');
  document.getElementById('c-lbl-subject').textContent   = t('c_subject');
  document.getElementById('c-lbl-msg').textContent       = t('c_msg');
  document.getElementById('c-send').textContent          = t('c_send');
  document.getElementById('c-info-title').textContent    = t('c_info_title');
  document.getElementById('c-hours').textContent         = currentLang==='am' ? 'ሰኞ–ቅዳሜ: 8:00–6:00 ምሽት' : 'Mon–Sat: 8:00 AM – 6:00 PM';
  document.getElementById('footer-copy').textContent     = t('footer_copy');
  document.documentElement.lang = currentLang;
}

async function submitBooking() {
  var fname = document.getElementById('f-fname').value.trim();
  var phone = document.getElementById('f-phone').value.trim();
  var type  = document.getElementById('f-type').value;
  var date  = document.getElementById('f-date').value;
  if (!fname || !phone || !type || !date) { showToast(t('toast_error')); return; }

  var btn = document.getElementById('f-submit');
  btn.textContent = currentLang==='am' ? '⏳ እየተላከ...' : '⏳ Sending...';
  btn.disabled = true;

  try {
    var res = await fetch('/api/bookings', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        firstName: fname,
        lastName:  document.getElementById('f-lname').value.trim(),
        phone: phone,
        email:     document.getElementById('f-email').value.trim(),
        eventType: type,
        eventDate: date,
        location:  document.getElementById('f-location').value,
        guests:    document.getElementById('f-guests').value,
        notes:     document.getElementById('f-note').value.trim()
      })
    });
    var data = await res.json();
    if (data.success) {
      showToast(t('toast_book'));
      ['f-fname','f-lname','f-phone','f-email','f-guests','f-note'].forEach(function(id){ document.getElementById(id).value=''; });
      document.getElementById('f-type').selectedIndex = 0;
      document.getElementById('f-location').selectedIndex = 0;
      document.getElementById('f-date').value = '';
    } else {
      showToast('⚠️ ' + (data.message||'Error'));
    }
  } catch(e) {
    showToast(t('toast_book'));
  } finally {
    btn.textContent = t('f_submit');
    btn.disabled = false;
  }
}

async function submitContact() {
  var name  = document.getElementById('c-name').value.trim();
  var phone = document.getElementById('c-phone').value.trim();
  var msg   = document.getElementById('c-msg').value.trim();
  if (!name || !phone || !msg) { showToast(t('toast_error')); return; }
  try {
    await fetch('/api/contacts', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name:name, phone:phone, subject:document.getElementById('c-subject').value, message:msg })
    });
  } catch(e) {}
  showToast(t('toast_contact'));
  ['c-name','c-phone','c-subject','c-msg'].forEach(function(id){ document.getElementById(id).value=''; });
}

renderAll();
</script>
